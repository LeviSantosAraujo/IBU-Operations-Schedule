name: Daily Excel Sync

on:
  schedule:
    # Run daily at 2 AM UTC (10 PM EST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-excel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
      
      - name: Run Excel sync
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          cd api/backend
          python sync_excel.py
      
      - name: Commit updated Excel file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/backend/uploads/ibu_schedule.xlsx
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily Excel sync from Blob storage"
          git push
